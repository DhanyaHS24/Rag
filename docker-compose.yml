services:
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.5.0
    ports:
      - "${CHROMA_PORT_HOST:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  garnet:
    image: ghcr.io/microsoft/garnet:latest
    ports:
      - "${GARNET_PORT:-6379}:6379"
    volumes:
      - garnet_data:/data
    ulimits:
      memlock: -1
    restart: unless-stopped

  upload_service:
    build:
      context: .
      dockerfile: services/upload_service/dockerfile
    ports:
      - "${UPLOAD_SERVICE_PORT:-8004}:8000"
    depends_on:
      - minio
      - nats
      - mongodb
    environment:
      MINIO_URL: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-raw-documents}
      NATS_URL: nats://nats:4222
      MONGO_URL: mongodb://mongodb:27017
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://localhost:8502
    restart: unless-stopped

  ingestion_service:
    build:
      context: .
      dockerfile: services/ingestion_service/dockerfile
    depends_on:
      - minio
      - nats
      - chromadb
      - mongodb
    environment:
      MINIO_URL: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-raw-documents}
      NATS_URL: nats://nats:4222
      CHROMA_URL: chromadb
      CHROMA_PORT: 8000
      MONGO_URL: mongodb://mongodb:27017
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-local}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    restart: unless-stopped

  retrieval_service:
    build:
      context: .
      dockerfile: services/retrieval_service/dockerfile
    ports:
      - "${RETRIEVAL_SERVICE_PORT:-8005}:8002"
    depends_on:
      - chromadb
      - mongodb
      - garnet
    environment:
      CHROMA_URL: chromadb
      CHROMA_PORT: 8000
      MONGO_URL: mongodb://mongodb:27017
      GARNET_URL: garnet:6379
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-local}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

  user_service:
    build:
      context: .
      dockerfile: services/user_service/dockerfile
    ports:
      - "${USER_SERVICE_PORT:-8003}:8003"
    depends_on:
      - mongodb
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: rag_users
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/dockerfile
    ports:
      - "${FRONTEND_PORT:-8502}:8501"
    depends_on:
      - upload_service
      - retrieval_service
      - user_service
    environment:
      BACKEND_UPLOAD_URL: http://upload_service:8000/upload
      BACKEND_CHAT_URL: http://retrieval_service:8002/chat
      BACKEND_USER_URL: http://user_service:8003
    restart: unless-stopped

volumes:
  minio_data:
  chroma_data:
  mongo_data:
  garnet_data:
